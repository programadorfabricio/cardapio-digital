<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel — FH Cardápio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>

:root{
  --cor-fundo: #1A1410;
  --cor-fundo-alt: #221A14;
  --cor-card: #2B2018;
  --cor-card-borda: #3D2B1F;
  --cor-brasa: #C5402B;
  --cor-brasa-clara: #E15A3F;
  --cor-dourado: #E8B649;
  --cor-creme: #F5EBDC;
  --cor-creme-fraco: #C9BCA9;
  --cor-verde: #4A7C59;
  --fonte-display: 'Anton', sans-serif;
  --fonte-corpo: 'Inter', sans-serif;
}

*{ margin:0; padding:0; box-sizing:border-box; }
body{
  background: var(--cor-fundo);
  color: var(--cor-creme);
  font-family: var(--fonte-corpo);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ===== TELA DE LOGIN ===== */
.login-wrap{
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.login-card{
  background: var(--cor-card);
  border: 1px solid var(--cor-card-borda);
  border-radius: 16px;
  padding: 32px 28px;
  width: 100%;
  max-width: 360px;
  text-align: center;
}
.login-card h1{
  font-family: var(--fonte-display);
  font-size: 22px;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
  color: var(--cor-creme);
}
.login-card p{
  font-size: 13px;
  color: var(--cor-creme-fraco);
  margin-bottom: 22px;
}
.login-input{
  width: 100%;
  background: var(--cor-fundo-alt);
  border: 1px solid var(--cor-card-borda);
  border-radius: 10px;
  padding: 13px 14px;
  color: var(--cor-creme);
  font-size: 15px;
  outline: none;
  margin-bottom: 14px;
  text-align: center;
  letter-spacing: 1px;
}
.login-input:focus{ border-color: var(--cor-brasa); }
.login-btn{
  width: 100%;
  background: var(--cor-brasa);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s ease;
}
.login-btn:hover{ background: var(--cor-brasa-clara); }
.login-erro{
  color: var(--cor-brasa-clara);
  font-size: 13px;
  margin-top: 12px;
  min-height: 16px;
}

/* ===== PAINEL ===== */
.painel{ display: none; padding-bottom: 80px; }
.painel.ativo{ display: block; }

.topo{
  background: var(--cor-fundo-alt);
  border-bottom: 1px solid var(--cor-card-borda);
  padding: 18px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
}
.topo h1{
  font-family: var(--fonte-display);
  font-size: 18px;
  letter-spacing: 0.5px;
}
.topo h1 span{ color: var(--cor-brasa-clara); }
.btn-sair{
  background: none;
  border: 1px solid var(--cor-card-borda);
  color: var(--cor-creme-fraco);
  border-radius: 8px;
  padding: 7px 14px;
  font-size: 12px;
  cursor: pointer;
}
.btn-sair:hover{ border-color: var(--cor-brasa); color: var(--cor-creme); }

.conteudo{ padding: 20px; max-width: 720px; margin: 0 auto; }

.abas{
  display: flex;
  gap: 6px;
  margin-bottom: 20px;
  background: var(--cor-fundo-alt);
  padding: 4px;
  border-radius: 10px;
}
.aba-btn{
  flex: 1;
  background: none;
  border: none;
  color: var(--cor-creme-fraco);
  padding: 10px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s ease;
}
.aba-btn.ativa{ background: var(--cor-brasa); color: #fff; }

.aba-conteudo{ display: none; }
.aba-conteudo.ativa{ display: block; }

.status-msg{
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
}
.status-msg.sucesso{ background: rgba(74,124,89,0.2); border: 1px solid var(--cor-verde); color: #9fd4ac; display: block; }
.status-msg.erro{ background: rgba(197,64,43,0.15); border: 1px solid var(--cor-brasa); color: var(--cor-brasa-clara); display: block; }

.categoria-bloco{ margin-bottom: 28px; }
.categoria-titulo{
  font-family: var(--fonte-display);
  font-size: 15px;
  color: var(--cor-dourado);
  letter-spacing: 0.5px;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--cor-card-borda);
}

.item-card{
  background: var(--cor-card);
  border: 1px solid var(--cor-card-borda);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
  transition: opacity 0.2s ease;
}
.item-card.indisponivel{ opacity: 0.5; }

.campo-grupo{ margin-bottom: 10px; }
.campo-label{
  font-size: 11px;
  color: var(--cor-creme-fraco);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 5px;
  display: block;
}
.campo-input, .campo-textarea{
  width: 100%;
  background: var(--cor-fundo-alt);
  border: 1px solid var(--cor-card-borda);
  border-radius: 8px;
  padding: 10px 12px;
  color: var(--cor-creme);
  font-family: var(--fonte-corpo);
  font-size: 14px;
  outline: none;
}
.campo-textarea{ resize: vertical; min-height: 44px; }
.campo-input:focus, .campo-textarea:focus{ border-color: var(--cor-brasa); }

.campo-linha{ display: flex; gap: 10px; }
.campo-linha > div{ flex: 1; }

.item-rodape{
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--cor-card-borda);
}

.toggle-disponivel{
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--cor-creme-fraco);
  cursor: pointer;
}
.toggle-switch{
  width: 38px;
  height: 22px;
  background: var(--cor-card-borda);
  border-radius: 11px;
  position: relative;
  transition: background 0.2s ease;
}
.toggle-switch.on{ background: var(--cor-verde); }
.toggle-switch::after{
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 18px; height: 18px;
  background: #fff;
  border-radius: 50%;
  transition: left 0.2s ease;
}
.toggle-switch.on::after{ left: 18px; }

.item-acoes{ display: flex; gap: 8px; }
.btn-salvar-item{
  background: var(--cor-verde);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
}
.btn-remover-item{
  background: none;
  border: 1px solid var(--cor-brasa);
  color: var(--cor-brasa-clara);
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 12px;
  cursor: pointer;
}

.btn-add-item{
  width: 100%;
  background: var(--cor-fundo-alt);
  border: 1.5px dashed var(--cor-card-borda);
  color: var(--cor-creme-fraco);
  border-radius: 12px;
  padding: 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
}
.btn-add-item:hover{ border-color: var(--cor-brasa); color: var(--cor-creme); }

/* ===== UPLOAD DE FOTO ===== */
.foto-area{
  display: flex;
  align-items: center;
  gap: 12px;
}
.foto-preview{
  width: 64px;
  height: 64px;
  border-radius: 10px;
  background: var(--cor-fundo-alt);
  border: 1px solid var(--cor-card-borda);
  object-fit: cover;
  flex-shrink: 0;
}
.foto-preview-vazia{
  width: 64px;
  height: 64px;
  border-radius: 10px;
  background: var(--cor-fundo-alt);
  border: 1px dashed var(--cor-card-borda);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: var(--cor-creme-fraco);
  flex-shrink: 0;
}
.btn-upload-foto{
  background: var(--cor-fundo-alt);
  border: 1px solid var(--cor-card-borda);
  color: var(--cor-creme);
  border-radius: 8px;
  padding: 9px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
.btn-upload-foto:hover{ border-color: var(--cor-brasa); }
.btn-upload-foto:disabled{ opacity: 0.6; cursor: wait; }
.input-arquivo-oculto{ display: none; }
.foto-status{
  font-size: 11px;
  color: var(--cor-creme-fraco);
  margin-top: 4px;
}

/* ===== CATEGORIAS ===== */
.categoria-item{
  background: var(--cor-card);
  border: 1px solid var(--cor-card-borda);
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.categoria-item input{
  flex: 1;
  background: var(--cor-fundo-alt);
  border: 1px solid var(--cor-card-borda);
  border-radius: 8px;
  padding: 9px 11px;
  color: var(--cor-creme);
  font-family: var(--fonte-corpo);
  font-size: 14px;
  outline: none;
}
.categoria-item input:focus{ border-color: var(--cor-brasa); }
.categoria-contador{
  font-size: 11px;
  color: var(--cor-creme-fraco);
  white-space: nowrap;
  min-width: 56px;
  text-align: right;
}
.categoria-acoes{ display: flex; gap: 4px; }
.btn-icone{
  background: var(--cor-fundo-alt);
  border: 1px solid var(--cor-card-borda);
  color: var(--cor-creme-fraco);
  border-radius: 7px;
  width: 30px;
  height: 30px;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.btn-icone:hover{ border-color: var(--cor-brasa); color: var(--cor-creme); }
.btn-icone:disabled{ opacity: 0.3; cursor: not-allowed; }
.btn-icone.remover:hover{ border-color: var(--cor-brasa); color: var(--cor-brasa-clara); }
.btn-icone-salvar{
  background: var(--cor-verde);
  border: none;
  color: #fff;
}
.dica-texto{
  font-size: 12px;
  color: var(--cor-creme-fraco);
  margin-bottom: 14px;
  line-height: 1.5;
}

/* ===== ABA CONFIG ===== */
.config-card{
  background: var(--cor-card);
  border: 1px solid var(--cor-card-borda);
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 16px;
}
.config-card h3{
  font-size: 13px;
  color: var(--cor-dourado);
  margin-bottom: 14px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.btn-salvar-config{
  width: 100%;
  background: var(--cor-brasa);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 4px;
}
.btn-salvar-config:hover{ background: var(--cor-brasa-clara); }

.loading{
  text-align: center;
  padding: 40px 20px;
  color: var(--cor-creme-fraco);
  font-size: 14px;
}

@media(min-width:600px){
  .conteudo{ padding: 28px 20px; }
}

</style>
</head>
<body>

<!-- ===== TELA DE LOGIN ===== -->
<div class="login-wrap" id="telaLogin">
  <div class="login-card">
    <h1>FH CARDÁPIO</h1>
    <p>Painel administrativo — digite a senha de acesso</p>
    <input type="password" class="login-input" id="inputSenha" placeholder="Senha" autocomplete="off">
    <button class="login-btn" id="btnEntrar">Entrar</button>
    <div class="login-erro" id="loginErro"></div>
  </div>
</div>

<!-- ===== PAINEL ===== -->
<div class="painel" id="telaPainel">
  <div class="topo">
    <h1>FH <span>CARDÁPIO</span></h1>
    <button class="btn-sair" id="btnSair">Sair</button>
  </div>

  <div class="conteudo">
    <div class="status-msg" id="statusMsg"></div>

    <div class="abas">
      <button class="aba-btn ativa" data-aba="itens">Cardápio</button>
      <button class="aba-btn" data-aba="categorias">Categorias</button>
      <button class="aba-btn" data-aba="config">Configurações</button>
    </div>

    <div class="aba-conteudo ativa" id="abaItens">
      <div class="loading" id="loadingItens">Carregando itens...</div>
      <div id="listaCategorias"></div>
    </div>

    <div class="aba-conteudo" id="abaCategorias">
      <p class="dica-texto">Organize as seções do seu cardápio (ex: Burgers, Bebidas, Doses). Use as setas para mudar a ordem em que aparecem para o cliente.</p>
      <div class="loading" id="loadingCategorias">Carregando categorias...</div>
      <div id="listaCategoriasGerenciar"></div>
      <button class="btn-add-item" id="btnAddCategoria">+ Adicionar nova categoria</button>
    </div>

    <div class="aba-conteudo" id="abaConfig">
      <div class="config-card">
        <h3>Dados da loja</h3>
        <div class="campo-grupo">
          <label class="campo-label">Nome da loja</label>
          <input class="campo-input" id="cfgNome">
        </div>
        <div class="campo-grupo">
          <label class="campo-label">Número do WhatsApp (formato 55DDDNÚMERO)</label>
          <input class="campo-input" id="cfgWhatsapp" placeholder="5519999999999">
        </div>
      </div>

      <div class="config-card">
        <h3>Horário de funcionamento</h3>
        <div class="campo-linha">
          <div>
            <label class="campo-label">Abre às</label>
            <input class="campo-input" type="time" id="cfgAbertura">
          </div>
          <div>
            <label class="campo-label">Fecha às</label>
            <input class="campo-input" type="time" id="cfgFechamento">
          </div>
        </div>
        <div style="margin-top:14px;">
          <label class="toggle-disponivel" id="toggleAbertoManual">
            <div class="toggle-switch" id="switchAbertoManual"></div>
            <span>Loja aberta para pedidos (desligue para pausar manualmente, ex: feriado)</span>
          </label>
        </div>
      </div>

      <button class="btn-salvar-config" id="btnSalvarConfig">Salvar configurações</button>
    </div>
  </div>
</div>

<script>
/* ============================================
   CONFIGURAÇÃO — mesma do cardápio principal
   ============================================ */
const SUPABASE_URL = "https://ahpdonsxsdxttmngimwd.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_f05x9dkPvuhJMN_ZWipgbw_-l-SWdp4";
const SLUG_LOJA = "brasa-cia";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let itensCache = [];
let categoriasCache = [];
let configCache = null;

/* ============================================
   LOGIN
   ============================================ */
function jaAutenticado(){
  return sessionStorage.getItem("fhcardapio_auth_" + SLUG_LOJA) === "ok";
}

async function tentarLogin(){
  const senha = document.getElementById("inputSenha").value.trim();
  const erroEl = document.getElementById("loginErro");
  erroEl.textContent = "";

  if(!senha){ erroEl.textContent = "Digite a senha."; return; }

  try {
    const { data, error } = await supabaseClient
      .from("lojas_config")
      .select("senha_painel")
      .eq("slug_loja", SLUG_LOJA)
      .single();

    if(error || !data){
      erroEl.textContent = "Não foi possível verificar a senha. Tente novamente.";
      return;
    }

    if(senha === data.senha_painel){
      sessionStorage.setItem("fhcardapio_auth_" + SLUG_LOJA, "ok");
      mostrarPainel();
    } else {
      erroEl.textContent = "Senha incorreta.";
    }
  } catch(e){
    erroEl.textContent = "Erro de conexão. Verifique sua internet.";
  }
}

document.getElementById("btnEntrar").onclick = tentarLogin;
document.getElementById("inputSenha").addEventListener("keydown", (e) => {
  if(e.key === "Enter") tentarLogin();
});

document.getElementById("btnSair").onclick = () => {
  sessionStorage.removeItem("fhcardapio_auth_" + SLUG_LOJA);
  document.getElementById("telaPainel").classList.remove("ativo");
  document.getElementById("telaLogin").style.display = "flex";
};

function mostrarPainel(){
  document.getElementById("telaLogin").style.display = "none";
  document.getElementById("telaPainel").classList.add("ativo");
  carregarTudo();
}

/* ============================================
   ABAS
   ============================================ */
document.querySelectorAll(".aba-btn").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".aba-btn").forEach(b => b.classList.remove("ativa"));
    document.querySelectorAll(".aba-conteudo").forEach(a => a.classList.remove("ativa"));
    btn.classList.add("ativa");
    const nomeAba = btn.dataset.aba;
    const idAba = "aba" + nomeAba.charAt(0).toUpperCase() + nomeAba.slice(1);
    document.getElementById(idAba).classList.add("ativa");
  };
});

/* ============================================
   MENSAGENS DE STATUS
   ============================================ */
function mostrarStatus(msg, tipo){
  const el = document.getElementById("statusMsg");
  el.textContent = msg;
  el.className = "status-msg " + tipo;
  window.scrollTo({top:0, behavior:"smooth"});
  setTimeout(() => { el.className = "status-msg"; }, 4000);
}

/* ============================================
   CARREGAMENTO
   ============================================ */
async function carregarTudo(){
  await Promise.all([carregarCategorias(), carregarConfig()]);
  await carregarItens();
  renderizarCategorias(); // re-renderiza pra atualizar a contagem de itens por categoria
}

async function carregarCategorias(){
  document.getElementById("loadingCategorias").style.display = "block";
  try {
    const { data, error } = await supabaseClient
      .from("cardapio_categorias")
      .select("*")
      .eq("slug_loja", SLUG_LOJA)
      .order("ordem", { ascending: true });

    if(error) throw error;
    categoriasCache = data || [];
    renderizarCategorias();
  } catch(e){
    mostrarStatus("Erro ao carregar categorias: " + e.message, "erro");
  }
  document.getElementById("loadingCategorias").style.display = "none";
}

async function carregarItens(){
  document.getElementById("loadingItens").style.display = "block";
  try {
    const { data, error } = await supabaseClient
      .from("cardapio_itens")
      .select("*")
      .eq("slug_loja", SLUG_LOJA)
      .order("ordem", { ascending: true });

    if(error) throw error;
    itensCache = data || [];
    renderizarItens();
  } catch(e){
    mostrarStatus("Erro ao carregar itens: " + e.message, "erro");
  }
  document.getElementById("loadingItens").style.display = "none";
}

async function carregarConfig(){
  try {
    const { data, error } = await supabaseClient
      .from("lojas_config")
      .select("*")
      .eq("slug_loja", SLUG_LOJA)
      .single();

    if(error) throw error;
    configCache = data;

    document.getElementById("cfgNome").value = data.nome_loja || "";
    document.getElementById("cfgWhatsapp").value = data.numero_whatsapp || "";
    document.getElementById("cfgAbertura").value = (data.horario_abertura || "00:00").slice(0,5);
    document.getElementById("cfgFechamento").value = (data.horario_fechamento || "23:59").slice(0,5);

    const sw = document.getElementById("switchAbertoManual");
    sw.classList.toggle("on", data.aberto_manual !== false);
  } catch(e){
    mostrarStatus("Erro ao carregar configurações: " + e.message, "erro");
  }
}

document.getElementById("toggleAbertoManual").onclick = () => {
  document.getElementById("switchAbertoManual").classList.toggle("on");
};

/* ============================================
   RENDERIZAÇÃO DOS ITENS
   ============================================ */
function renderizarItens(){
  const container = document.getElementById("listaCategorias");
  container.innerHTML = "";

  if(categoriasCache.length === 0){
    container.innerHTML = `<p style="color:var(--cor-creme-fraco); font-size:13px; text-align:center; padding:20px;">Crie pelo menos uma categoria na aba "Categorias" antes de adicionar itens.</p>`;
    return;
  }

  const porCategoria = {};
  categoriasCache.forEach(cat => { porCategoria[cat.id] = []; });

  const semCategoria = [];
  itensCache.forEach(item => {
    if(item.categoria_id && porCategoria[item.categoria_id]){
      porCategoria[item.categoria_id].push(item);
    } else {
      semCategoria.push(item);
    }
  });

  categoriasCache.forEach(cat => {
    const bloco = document.createElement("div");
    bloco.className = "categoria-bloco";
    bloco.innerHTML = `<div class="categoria-titulo">${cat.nome}</div>`;

    if(porCategoria[cat.id].length === 0){
      const vazio = document.createElement("p");
      vazio.style.cssText = "color:var(--cor-creme-fraco); font-size:13px; padding:4px 0 12px;";
      vazio.textContent = "Nenhum item nesta categoria ainda.";
      bloco.appendChild(vazio);
    } else {
      porCategoria[cat.id].forEach(item => {
        bloco.appendChild(criarCardItem(item));
      });
    }

    const btnAdd = document.createElement("button");
    btnAdd.className = "btn-add-item";
    btnAdd.textContent = `+ Adicionar item em "${cat.nome}"`;
    btnAdd.onclick = () => criarNovoItem(cat.id);
    bloco.appendChild(btnAdd);

    container.appendChild(bloco);
  });

  if(semCategoria.length > 0){
    const bloco = document.createElement("div");
    bloco.className = "categoria-bloco";
    bloco.innerHTML = `<div class="categoria-titulo">Sem categoria</div>`;
    semCategoria.forEach(item => bloco.appendChild(criarCardItem(item)));
    container.appendChild(bloco);
  }
}

function criarCardItem(item){
  const card = document.createElement("div");
  card.className = "item-card" + (item.disponivel === false ? " indisponivel" : "");
  card.dataset.id = item.id;
  card.dataset.imagemUrl = item.imagem_url || "";

  const opcoesCategoria = categoriasCache.map(cat =>
    `<option value="${cat.id}" ${item.categoria_id === cat.id ? "selected" : ""}>${cat.nome}</option>`
  ).join("");

  card.innerHTML = `
    <div class="campo-grupo">
      <label class="campo-label">Categoria</label>
      <select class="campo-input campo-categoria">${opcoesCategoria}</select>
    </div>
    <div class="campo-grupo">
      <label class="campo-label">Nome do item</label>
      <input class="campo-input campo-nome" value="${item.nome || ""}">
    </div>
    <div class="campo-grupo">
      <label class="campo-label">Descrição</label>
      <textarea class="campo-textarea campo-descricao">${item.descricao || ""}</textarea>
    </div>
    <div class="campo-linha">
      <div class="campo-grupo">
        <label class="campo-label">Preço (R$)</label>
        <input class="campo-input campo-preco" type="number" step="0.01" value="${item.preco || 0}">
      </div>
    </div>
    <div class="campo-grupo">
      <label class="campo-label">Foto do item</label>
      <div class="foto-area">
        ${item.imagem_url
          ? `<img class="foto-preview campo-foto-preview" src="${item.imagem_url}" alt="">`
          : `<div class="foto-preview-vazia campo-foto-preview">🍔</div>`}
        <div>
          <button type="button" class="btn-upload-foto" data-acao="upload-foto">📷 ${item.imagem_url ? "Trocar foto" : "Adicionar foto"}</button>
          <div class="foto-status campo-foto-status"></div>
        </div>
        <input type="file" accept="image/*" class="input-arquivo-oculto campo-input-arquivo">
      </div>
    </div>
    <div class="item-rodape">
      <label class="toggle-disponivel">
        <div class="toggle-switch ${item.disponivel !== false ? 'on' : ''}" data-toggle-disponivel></div>
        <span>Disponível no cardápio</span>
      </label>
      <div class="item-acoes">
        <button class="btn-remover-item" data-acao="remover">Remover</button>
        <button class="btn-salvar-item" data-acao="salvar">Salvar</button>
      </div>
    </div>
  `;

  card.querySelector("[data-toggle-disponivel]").onclick = (e) => {
    e.target.classList.toggle("on");
  };

  const inputArquivo = card.querySelector(".campo-input-arquivo");
  card.querySelector('[data-acao="upload-foto"]').onclick = () => inputArquivo.click();
  inputArquivo.onchange = (e) => {
    const arquivo = e.target.files[0];
    if(arquivo) fazerUploadFoto(card, arquivo);
  };

  card.querySelector('[data-acao="salvar"]').onclick = () => salvarItem(card, item.id);
  card.querySelector('[data-acao="remover"]').onclick = () => removerItem(card, item.id, item.nome);

  return card;
}

async function fazerUploadFoto(card, arquivo){
  const TAMANHO_MAXIMO = 5 * 1024 * 1024; // 5MB
  if(arquivo.size > TAMANHO_MAXIMO){
    mostrarStatus("Foto muito grande. Escolha uma imagem de até 5MB.", "erro");
    return;
  }
  if(!arquivo.type.startsWith("image/")){
    mostrarStatus("O arquivo precisa ser uma imagem.", "erro");
    return;
  }

  const btn = card.querySelector('[data-acao="upload-foto"]');
  const statusEl = card.querySelector(".campo-foto-status");
  btn.disabled = true;
  btn.textContent = "Enviando...";
  statusEl.textContent = "";

  try {
    const extensao = arquivo.name.split(".").pop().toLowerCase();
    const nomeArquivo = `${SLUG_LOJA}/${card.dataset.id || "novo"}-${Date.now()}.${extensao}`;

    const { error: erroUpload } = await supabaseClient
      .storage
      .from("cardapio-fotos")
      .upload(nomeArquivo, arquivo, { cacheControl: "3600", upsert: true });

    if(erroUpload) throw erroUpload;

    const { data: urlData } = supabaseClient
      .storage
      .from("cardapio-fotos")
      .getPublicUrl(nomeArquivo);

    const urlPublica = urlData.publicUrl;
    card.dataset.imagemUrl = urlPublica;

    const preview = card.querySelector(".campo-foto-preview");
    const novaImg = document.createElement("img");
    novaImg.className = "foto-preview campo-foto-preview";
    novaImg.src = urlPublica;
    preview.replaceWith(novaImg);

    btn.textContent = "📷 Trocar foto";
    statusEl.textContent = "Foto enviada. Clique em Salvar para confirmar.";
  } catch(e){
    mostrarStatus("Erro ao enviar foto: " + e.message, "erro");
    btn.textContent = "📷 Adicionar foto";
  }
  btn.disabled = false;
}

async function salvarItem(card, id){
  const payload = {
    categoria_id: card.querySelector(".campo-categoria").value || null,
    nome: card.querySelector(".campo-nome").value.trim(),
    descricao: card.querySelector(".campo-descricao").value.trim(),
    preco: parseFloat(card.querySelector(".campo-preco").value) || 0,
    imagem_url: card.dataset.imagemUrl || "",
    disponivel: card.querySelector("[data-toggle-disponivel]").classList.contains("on")
  };

  if(!payload.nome || !payload.categoria_id){
    mostrarStatus("Nome e categoria são obrigatórios.", "erro");
    return;
  }

  try {
    const { error } = await supabaseClient
      .from("cardapio_itens")
      .update(payload)
      .eq("id", id);

    if(error) throw error;
    mostrarStatus(`"${payload.nome}" foi salvo com sucesso.`, "sucesso");
    await carregarItens();
  } catch(e){
    mostrarStatus("Erro ao salvar: " + e.message, "erro");
  }
}

async function removerItem(card, id, nome){
  if(!confirm(`Remover "${nome}" do cardápio? Essa ação não pode ser desfeita.`)) return;

  try {
    const { error } = await supabaseClient
      .from("cardapio_itens")
      .delete()
      .eq("id", id);

    if(error) throw error;
    mostrarStatus(`"${nome}" foi removido.`, "sucesso");
    await carregarItens();
  } catch(e){
    mostrarStatus("Erro ao remover: " + e.message, "erro");
  }
}

/* ============================================
   ADICIONAR NOVO ITEM
   ============================================ */
async function criarNovoItem(categoriaId){
  try {
    const { data, error } = await supabaseClient
      .from("cardapio_itens")
      .insert({
        slug_loja: SLUG_LOJA,
        categoria_id: categoriaId,
        nome: "Novo item",
        descricao: "",
        preco: 0,
        imagem_url: "",
        disponivel: true,
        ordem: itensCache.length + 1
      })
      .select()
      .single();

    if(error) throw error;
    mostrarStatus("Novo item criado. Edite os campos abaixo e clique em Salvar.", "sucesso");
    await carregarItens();

    setTimeout(() => {
      const novoCard = document.querySelector(`[data-id="${data.id}"]`);
      if(novoCard) novoCard.scrollIntoView({behavior:"smooth", block:"center"});
    }, 200);
  } catch(e){
    mostrarStatus("Erro ao criar item: " + e.message, "erro");
  }
}

/* ============================================
   GERENCIAMENTO DE CATEGORIAS
   ============================================ */
function renderizarCategorias(){
  const container = document.getElementById("listaCategoriasGerenciar");
  container.innerHTML = "";

  if(categoriasCache.length === 0){
    container.innerHTML = `<p style="color:var(--cor-creme-fraco); font-size:13px; text-align:center; padding:20px 0;">Nenhuma categoria ainda. Crie a primeira abaixo.</p>`;
    return;
  }

  categoriasCache.forEach((cat, index) => {
    const qtdItens = itensCache.filter(i => i.categoria_id === cat.id).length;

    const linha = document.createElement("div");
    linha.className = "categoria-item";
    linha.innerHTML = `
      <input type="text" value="${cat.nome}" data-id="${cat.id}">
      <span class="categoria-contador">${qtdItens} ${qtdItens === 1 ? "item" : "itens"}</span>
      <div class="categoria-acoes">
        <button class="btn-icone" data-acao="subir" title="Mover para cima" ${index === 0 ? "disabled" : ""}>↑</button>
        <button class="btn-icone" data-acao="descer" title="Mover para baixo" ${index === categoriasCache.length - 1 ? "disabled" : ""}>↓</button>
        <button class="btn-icone btn-icone-salvar" data-acao="salvar" title="Salvar nome">✓</button>
        <button class="btn-icone remover" data-acao="remover" title="Remover categoria">✕</button>
      </div>
    `;

    linha.querySelector('[data-acao="salvar"]').onclick = () => salvarNomeCategoria(cat.id, linha.querySelector("input").value);
    linha.querySelector('[data-acao="remover"]').onclick = () => removerCategoria(cat.id, cat.nome, qtdItens);
    linha.querySelector('[data-acao="subir"]').onclick = () => moverCategoria(index, -1);
    linha.querySelector('[data-acao="descer"]').onclick = () => moverCategoria(index, 1);

    container.appendChild(linha);
  });
}

document.getElementById("btnAddCategoria").onclick = async () => {
  const maxOrdem = categoriasCache.reduce((max, c) => Math.max(max, c.ordem || 0), 0);

  try {
    const { error } = await supabaseClient
      .from("cardapio_categorias")
      .insert({
        slug_loja: SLUG_LOJA,
        nome: "Nova categoria",
        ordem: maxOrdem + 1
      });

    if(error) throw error;
    mostrarStatus("Categoria criada. Edite o nome abaixo.", "sucesso");
    await carregarCategorias();
  } catch(e){
    mostrarStatus("Erro ao criar categoria: " + e.message, "erro");
  }
};

async function salvarNomeCategoria(id, novoNome){
  novoNome = novoNome.trim();
  if(!novoNome){
    mostrarStatus("O nome da categoria não pode ficar vazio.", "erro");
    return;
  }

  try {
    const { error } = await supabaseClient
      .from("cardapio_categorias")
      .update({ nome: novoNome })
      .eq("id", id);

    if(error) throw error;
    mostrarStatus("Categoria salva.", "sucesso");
    await carregarCategorias();
    await carregarItens(); // os itens mostram o nome da categoria, então recarrega também
  } catch(e){
    mostrarStatus("Erro ao salvar categoria: " + e.message, "erro");
  }
}

async function removerCategoria(id, nome, qtdItens){
  if(qtdItens > 0){
    mostrarStatus(`"${nome}" tem ${qtdItens} ${qtdItens === 1 ? "item" : "itens"} dentro. Mova ou remova esses itens antes de excluir a categoria.`, "erro");
    return;
  }

  if(!confirm(`Remover a categoria "${nome}"? Essa ação não pode ser desfeita.`)) return;

  try {
    const { error } = await supabaseClient
      .from("cardapio_categorias")
      .delete()
      .eq("id", id);

    if(error) throw error;
    mostrarStatus(`Categoria "${nome}" removida.`, "sucesso");
    await carregarCategorias();
  } catch(e){
    mostrarStatus("Erro ao remover categoria: " + e.message, "erro");
  }
}

async function moverCategoria(index, direcao){
  const outroIndex = index + direcao;
  if(outroIndex < 0 || outroIndex >= categoriasCache.length) return;

  const catA = categoriasCache[index];
  const catB = categoriasCache[outroIndex];

  try {
    const { error: erroA } = await supabaseClient
      .from("cardapio_categorias")
      .update({ ordem: catB.ordem })
      .eq("id", catA.id);
    if(erroA) throw erroA;

    const { error: erroB } = await supabaseClient
      .from("cardapio_categorias")
      .update({ ordem: catA.ordem })
      .eq("id", catB.id);
    if(erroB) throw erroB;

    await carregarCategorias();
  } catch(e){
    mostrarStatus("Erro ao reordenar categorias: " + e.message, "erro");
  }
}

    mostrarStatus("Configurações salvas com sucesso.", "sucesso");
